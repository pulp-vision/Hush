# DeepFilterNet-SE training configuration
# This matches the configuration used for the released model_best.ckpt
# Trained for 100 epochs on 16 kHz speech + background + noise data.

[df]
sr = 16000
fft_size = 320
hop_size = 160
nb_erb = 32
nb_df = 64
df_order = 5
df_lookahead = 0
norm_tau = 1.0
lsnr_max = 35
lsnr_min = -15
min_nb_erb_freqs = 2

[train]
seed = 42
max_epochs = 100
batch_size = 16
num_workers = 6
max_sample_len_s = 5.0
prefetch = 12
grad_clip = 1.0
log_freq = 200
validation_criteria = loss
validation_criteria_rule = min
early_stopping_patience = 25
dataloader_snrs = -100, -5, 0, 5, 10, 20, 40
dataloader_gains = -6, 0, 6
global_ds_sampling_f = 1.0

[distortion]
# 20% of samples will have reverb applied via room impulse responses
p_reverb = 0.1
p_bandwidth_ext = 0.0
p_clipping = 0.0
p_zeroing = 0.0
p_air_absorption = 0.0
# 60% of training samples include a background speaker (human voice interferer)
p_interfer_sp = 0.6
p_fill_speech = 0.0
# Background speaker mixed at these SIR values (dB), randomly sampled each batch
interfer_snrs = 24.0, 20.0, 18.0, 16.0, 14.0, 12.0

[deepfilternet]
conv_ch = 16
conv_depthwise = true
convt_depthwise = true
conv_kernel = 1, 3
convt_kernel = 1, 3
conv_kernel_inp = 3, 3
conv_lookahead = 0
emb_hidden_dim = 256
emb_num_layers = 2
emb_gru_skip_enc = none
emb_gru_skip = none
df_hidden_dim = 256
df_gru_skip = none
df_pathway_kernel_size_t = 1
enc_concat = false
df_num_layers = 3
df_n_iter = 1
lin_groups = 1
enc_lin_groups = 16
mask_pf = false
pf_beta = 0.02
lsnr_dropout = false

[optim]
optimizer = adamw
lr = 0.0005
lr_min = 0.000001
lr_warmup = 0.0001
weight_decay = 0.05
weight_decay_end = -1.0
amsgrad = true
warmup_epochs = 3
lr_cycle_mul = 1.0
lr_cycle_decay = 0.5
lr_cycle_epochs = -1
betas = 0.9, 0.999

[multiresspecloss]
# Multi-resolution spectral loss across 4 FFT scales
factor = 250.0
factor_complex = 250.0
gamma = 0.3
fft_sizes = 256, 512, 1024, 2048

[maskloss]
# Disabled in this run (spec-domain losses used instead)
factor = 0.0
mask = spec
gamma = 0.3
gamma_pred = 0.3

[spectralloss]
factor_magnitude = 0.0
factor_complex = 0.0
gamma = 0.3

[localsnrloss]
factor = 0.001

[sdrloss]
factor = 0.0

[loss]
# SeparationLoss for the auxiliary background speaker head
sep_factor = 0.1
